name: CI Pipeline

on: [push] # Executa a cada push no repositório

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Baixa o código do repositório
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask

      - name: Run Unit Tests
        run: python -m unittest -v tests/appTest.py